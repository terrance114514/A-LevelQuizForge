<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A-Level Smart Practice</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="bg-shape"></div>
  <main class="container">
    <section class="card hero">
      <h1>A-Level Smart Practice</h1>
      <p>服务国际高中生：按年级、考试局、科目、卷别精准组卷与错题诊断。</p>
    </section>

    <section class="card form-card">
      <h2>学习路径配置</h2>
      <div class="grid-2">
        <label>年级
          <select id="grade"></select>
        </label>
        <label>考试局
          <select id="board"></select>
        </label>
        <label>科目
          <select id="subject"></select>
        </label>
        <label>模块/卷别
          <select id="paper"></select>
        </label>
      </div>
      <div class="actions">
        <button id="goGenerate" class="btn-primary">生成模拟试卷练习题</button>
        <button id="goAnalysis" class="btn-secondary">查看错题分析示例</button>
        <button id="goAdmin" class="btn-secondary">查看后台数据面板</button>
        <button id="goLogin" class="btn-secondary">去登录页面</button>
      </div>
      <p id="backendStatus" class="tip"></p>
      <p class="tip">说明：当选择 CIE + Mathematics 时，会显示 P1/P2/P3/P4 等细分卷别。</p>
    </section>

    <section class="card panel">
      <details class="account-collapsible">
        <summary>账号设置（展开）</summary>
        <p id="accountStatus" class="tip"></p>
        <div class="grid-2">
          <label>昵称
            <input id="newDisplayName" type="text" placeholder="例如：Alice Zhang" />
          </label>
          <label>年级
            <input id="newGrade" type="text" placeholder="例如：A2" />
          </label>
          <label>目标分
            <input id="newTargetScore" type="number" min="0" max="100" placeholder="例如：90" />
          </label>
        </div>
        <div class="actions">
          <button id="updateProfileBtn" class="btn-primary">保存资料修改</button>
        </div>

        <div class="grid-2" style="margin-top: 0.8rem;">
          <label>旧密码
            <input id="oldPassword" type="password" placeholder="请输入旧密码" />
          </label>
          <label>新密码
            <input id="newPassword" type="password" placeholder="至少 6 位" />
          </label>
        </div>
        <div class="actions">
          <button id="changePasswordBtn" class="btn-primary">修改密码</button>
        </div>
      </details>
    </section>
  </main>

  <script src="scripts/data.js"></script>
  <script src="scripts/api.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
